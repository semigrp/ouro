name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: semigrp/boros
          path: boros-upstream
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir boros-upstream install --frozen-lockfile
      - run: pnpm --dir boros-upstream run build
      - run: pnpm test
        env:
          BOROS_ROOT: ${{ github.workspace }}/boros-upstream
